name: Tests (End-to-End)

on:
  push:
    branches:
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cypress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: yarn install

      - name: Validate required secrets
        env:
          BASIQ_API_KEY: ${{ secrets.BASIQ_API_KEY }}
        run: |
          if [ -z "$BASIQ_API_KEY" ]; then
            echo "BASIQ_API_KEY is missing"
            exit 1
          fi

      - name: Set session secret for CI runtime
        run: echo "SESSION_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Build the application
        run: yarn build

      - name: Start the application
        run: yarn start &

      - name: Wait for the application to start
        run: npx wait-on http://localhost:3000

      - name: Cypress run
        uses: cypress-io/github-action@v6
        env:
          BASIQ_API_KEY: ${{ secrets.BASIQ_API_KEY }}
          SESSION_SECRET: ${{ env.SESSION_SECRET }}
        with:
          wait-on: http://localhost:3000
          config-file: cypress.config.js
          runTests: cypress run --headless --disable-gpu

      - name: Cypress security regressions
        env:
          BASIQ_API_KEY: ${{ secrets.BASIQ_API_KEY }}
          SESSION_SECRET: ${{ env.SESSION_SECRET }}
        run: yarn cypress:security
